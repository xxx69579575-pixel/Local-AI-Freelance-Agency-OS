<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>接案 OS — 人工審核佇列</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: #1a1d27;
      border-bottom: 1px solid #2d3148;
    }

    .header-left { display: flex; align-items: center; gap: 20px; }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #f59e0b;
    }

    .nav-link {
      font-size: 13px;
      color: #64748b;
      text-decoration: none;
    }
    .nav-link:hover { color: #94a3b8; }

    #refresh-info {
      font-size: 12px;
      color: #64748b;
    }
    #refresh-info span { color: #94a3b8; }

    #error-banner {
      display: none;
      background: #7f1d1d;
      color: #fca5a5;
      padding: 10px 24px;
      font-size: 13px;
    }

    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 24px 48px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-badge {
      background: #4c1d95;
      color: #c4b5fd;
      font-size: 10px;
      font-weight: 700;
      border-radius: 10px;
      padding: 1px 7px;
    }

    .section { margin-bottom: 32px; }

    .queue-item {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 16px 18px;
      margin-bottom: 10px;
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }

    .queue-item.type-quotation      { border-left: 3px solid #06b6d4; }
    .queue-item.type-project_review { border-left: 3px solid #eab308; }
    .queue-item.type-agent_dispatch { border-left: 3px solid #6366f1; }

    .item-body { flex: 1; min-width: 0; }

    .item-type {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }
    .type-quotation      .item-type { color: #22d3ee; }
    .type-project_review .item-type { color: #eab308; }
    .type-agent_dispatch .item-type { color: #818cf8; }

    .item-title {
      font-size: 14px;
      font-weight: 500;
      color: #e2e8f0;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item-meta {
      font-size: 11px;
      color: #64748b;
      margin-bottom: 8px;
    }

    .item-draft {
      font-size: 12px;
      color: #94a3b8;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 6px;
      padding: 8px 10px;
      max-height: 80px;
      overflow-y: auto;
      white-space: pre-wrap;
      margin-bottom: 10px;
      line-height: 1.5;
    }

    .item-actions { display: flex; gap: 8px; flex-wrap: wrap; }

    .btn {
      font-size: 12px;
      font-weight: 600;
      padding: 5px 14px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-approve  { background: #15803d; color: #bbf7d0; }
    .btn-reject   { background: #7f1d1d; color: #fca5a5; }
    .btn-ack      { background: #1e3a5f; color: #7dd3fc; }

    .feedback-input {
      width: 100%;
      font-size: 12px;
      padding: 6px 10px;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 6px;
      color: #e2e8f0;
      margin-bottom: 8px;
      resize: vertical;
      min-height: 50px;
    }
    .feedback-input:focus { outline: 1px solid #4c1d95; }

    .reject-form { display: none; margin-top: 8px; }
    .reject-form.open { display: block; }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 13px;
      color: #e2e8f0;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      max-width: 320px;
    }
    .toast.show { opacity: 1; }
    .toast.ok   { border-left: 3px solid #22c55e; }
    .toast.err  { border-left: 3px solid #ef4444; }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: #334155;
      font-size: 14px;
    }

    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #64748b;
      font-size: 14px;
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>人工審核佇列</h1>
    <a class="nav-link" href="/">← Kanban 看板</a>
  </div>
  <div id="refresh-info">
    上次更新：<span id="last-update">—</span>　每 30 秒自動刷新
  </div>
</header>

<div id="error-banner"></div>
<div id="loading">載入中…</div>

<div class="page" id="page" style="display:none">
  <div class="section" id="sec-quotation">
    <div class="section-title">
      報價審核 <span class="section-badge" id="cnt-quotation">0</span>
    </div>
    <div id="list-quotation"></div>
  </div>

  <div class="section" id="sec-project_review">
    <div class="section-title">
      專案初審 <span class="section-badge" id="cnt-project_review">0</span>
    </div>
    <div id="list-project_review"></div>
  </div>

  <div class="section" id="sec-agent_dispatch">
    <div class="section-title">
      Agent 派工確認 <span class="section-badge" id="cnt-agent_dispatch">0</span>
    </div>
    <div id="list-agent_dispatch"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString('zh-TW', {
    month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit',
  });
}

function showToast(msg, ok = true) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${ok ? 'ok' : 'err'}`;
  setTimeout(() => { t.className = 'toast'; }, 3500);
}

async function apiPatch(url, body = {}) {
  const res = await fetch(url, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}

function renderQuotation(item) {
  const el = document.createElement('div');
  el.className = 'queue-item type-quotation';
  el.dataset.id = item.id;
  el.innerHTML = `
    <div class="item-body">
      <div class="item-type">報價草稿</div>
      <div class="item-title">${escHtml(item.lead_title)}</div>
      <div class="item-meta">
        來源：${escHtml(item.source)} &nbsp;|&nbsp; 建立：${fmtDate(item.created_at)}
      </div>
      ${item.draft_content
        ? `<div class="item-draft">${escHtml(item.draft_content)}</div>`
        : ''}
      <div class="item-actions">
        <button class="btn btn-approve" onclick="approveQuotation(${item.id}, this)">確認送出</button>
        <button class="btn btn-reject"  onclick="toggleRejectForm(this)">退回修改</button>
      </div>
      <div class="reject-form">
        <textarea class="feedback-input" placeholder="修改意見（選填）"></textarea>
        <div class="item-actions">
          <button class="btn btn-reject" onclick="rejectQuotation(${item.id}, this)">確認退回</button>
        </div>
      </div>
    </div>
  `;
  return el;
}

function renderProjectReview(item) {
  const el = document.createElement('div');
  el.className = 'queue-item type-project_review';
  el.dataset.id = item.id;
  el.innerHTML = `
    <div class="item-body">
      <div class="item-type">專案初審</div>
      <div class="item-title">${escHtml(item.title)}</div>
      <div class="item-meta">
        客戶：${escHtml(item.client_name) || '—'} &nbsp;|&nbsp; 截止：${fmtDate(item.due_date)} &nbsp;|&nbsp; 更新：${fmtDate(item.updated_at)}
      </div>
      <div class="item-actions">
        <button class="btn btn-approve" onclick="approveProjectReview(${item.id}, this)">通過 → 開發中</button>
        <button class="btn btn-reject"  onclick="toggleRejectForm(this)">退回修正</button>
      </div>
      <div class="reject-form">
        <textarea class="feedback-input" placeholder="退回原因或修改說明（選填）"></textarea>
        <div class="item-actions">
          <button class="btn btn-reject" onclick="rejectProjectReview(${item.id}, this)">確認退回</button>
        </div>
      </div>
    </div>
  `;
  return el;
}

function renderAgentDispatch(item) {
  const el = document.createElement('div');
  el.className = 'queue-item type-agent_dispatch';
  el.dataset.id = item.id;
  el.innerHTML = `
    <div class="item-body">
      <div class="item-type">Agent 派工</div>
      <div class="item-title">${escHtml(item.agent_name)} — ${escHtml(item.action)}</div>
      <div class="item-meta">
        ${item.entity_type ? `對象：${escHtml(item.entity_type)} #${item.entity_id} &nbsp;|&nbsp;` : ''}
        時間：${fmtDate(item.created_at)}
      </div>
      ${item.output_summary
        ? `<div class="item-draft">${escHtml(item.output_summary)}</div>`
        : ''}
      <div class="item-actions">
        <button class="btn btn-ack" onclick="ackAgentLog(${item.id}, this)">已知曉</button>
      </div>
    </div>
  `;
  return el;
}

function toggleRejectForm(btn) {
  const form = btn.closest('.item-body').querySelector('.reject-form');
  form.classList.toggle('open');
}

async function approveQuotation(id, btn) {
  btn.disabled = true;
  try {
    await apiPatch(`/api/quotations/${id}/approve`);
    showToast('報價已確認，狀態更新為「已送報價」');
    btn.closest('.queue-item').remove();
    refreshCounts();
  } catch (err) {
    showToast(err.message, false);
    btn.disabled = false;
  }
}

async function rejectQuotation(id, btn) {
  btn.disabled = true;
  const note = btn.closest('.reject-form').querySelector('.feedback-input').value.trim();
  try {
    await apiPatch(`/api/quotations/${id}/reject`, { note });
    showToast('報價草稿已退回，已通知 revision-manager');
    btn.closest('.queue-item').remove();
    refreshCounts();
  } catch (err) {
    showToast(err.message, false);
    btn.disabled = false;
  }
}

async function approveProjectReview(id, btn) {
  btn.disabled = true;
  try {
    await apiPatch(`/api/projects/${id}/review`);
    showToast('專案通過初審，狀態更新為「開發中」');
    btn.closest('.queue-item').remove();
    refreshCounts();
  } catch (err) {
    showToast(err.message, false);
    btn.disabled = false;
  }
}

async function rejectProjectReview(id, btn) {
  btn.disabled = true;
  const feedback = btn.closest('.reject-form').querySelector('.feedback-input').value.trim();
  try {
    await apiPatch(`/api/projects/${id}/reject`, { feedback });
    showToast('專案退回修正，已建立 revision 記錄');
    btn.closest('.queue-item').remove();
    refreshCounts();
  } catch (err) {
    showToast(err.message, false);
    btn.disabled = false;
  }
}

async function ackAgentLog(id, btn) {
  btn.disabled = true;
  btn.closest('.queue-item').style.opacity = '0.4';
  setTimeout(() => btn.closest('.queue-item').remove(), 400);
  refreshCounts();
}

function refreshCounts() {
  ['quotation', 'project_review', 'agent_dispatch'].forEach(type => {
    const count = document.querySelectorAll(`#list-${type} .queue-item`).length;
    document.getElementById(`cnt-${type}`).textContent = count;
  });
}

async function fetchAndRender() {
  const errorBanner = document.getElementById('error-banner');
  try {
    const res = await fetch('/api/approval-queue');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const { items } = await res.json();

    const byType = { quotation: [], project_review: [], agent_dispatch: [] };
    for (const item of items) {
      if (byType[item.type]) byType[item.type].push(item);
    }

    ['quotation', 'project_review', 'agent_dispatch'].forEach(type => {
      const list = document.getElementById(`list-${type}`);
      list.innerHTML = '';
      const typeItems = byType[type];
      document.getElementById(`cnt-${type}`).textContent = typeItems.length;

      if (!typeItems.length) {
        list.innerHTML = '<div class="empty-state">目前無待審核項目</div>';
        return;
      }
      typeItems.forEach(item => {
        const el = type === 'quotation'      ? renderQuotation(item)
                 : type === 'project_review' ? renderProjectReview(item)
                                             : renderAgentDispatch(item);
        list.appendChild(el);
      });
    });

    document.getElementById('page').style.display = 'block';
    document.getElementById('loading').style.display = 'none';
    errorBanner.style.display = 'none';
    document.getElementById('last-update').textContent = new Date().toLocaleTimeString('zh-TW');
  } catch (err) {
    errorBanner.textContent = `無法載入資料：${err.message}`;
    errorBanner.style.display = 'block';
    document.getElementById('loading').style.display = 'none';
  }
}

fetchAndRender();
setInterval(fetchAndRender, 30000);
</script>

</body>
</html>
