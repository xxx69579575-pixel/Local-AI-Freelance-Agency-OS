<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>接案 OS — 任務治理</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: #1a1d27;
      border-bottom: 1px solid #2d3148;
    }

    .header-nav {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #a78bfa;
    }

    .nav-link {
      font-size: 13px;
      text-decoration: none;
      font-weight: 600;
      color: #64748b;
    }

    .nav-link:hover { color: #94a3b8; }

    #refresh-info {
      font-size: 12px;
      color: #64748b;
    }

    #error-banner {
      display: none;
      background: #7f1d1d;
      color: #fca5a5;
      padding: 10px 24px;
      font-size: 13px;
    }

    #success-banner {
      display: none;
      background: #052e16;
      color: #86efac;
      padding: 10px 24px;
      font-size: 13px;
    }

    .main-content {
      padding: 24px;
    }

    /* Filter bar */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .filter-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #64748b;
    }

    .filter-btn {
      background: #1a1d27;
      border: 1px solid #2d3148;
      color: #94a3b8;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover { border-color: #4c1d95; color: #c4b5fd; }
    .filter-btn.active { background: #4c1d95; border-color: #7c3aed; color: #e9d5ff; }

    .refresh-btn {
      margin-left: auto;
      background: #1a1d27;
      border: 1px solid #2d3148;
      color: #94a3b8;
      font-size: 12px;
      padding: 4px 14px;
      border-radius: 6px;
      cursor: pointer;
    }

    .refresh-btn:hover { border-color: #4c1d95; color: #c4b5fd; }

    /* Summary counts */
    .status-summary {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .status-chip {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 8px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 90px;
    }

    .status-chip-value {
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
    }

    .status-chip-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #64748b;
      margin-top: 4px;
    }

    .chip-running    .status-chip-value { color: #3b82f6; }
    .chip-dispatched .status-chip-value { color: #a78bfa; }
    .chip-completed  .status-chip-value { color: #22c55e; }
    .chip-failed     .status-chip-value { color: #ef4444; }
    .chip-cancelled  .status-chip-value { color: #78716c; }
    .chip-created    .status-chip-value { color: #94a3b8; }

    /* Task table */
    .task-table-wrap {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 10px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead {
      background: #13161f;
    }

    th {
      padding: 10px 14px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #64748b;
      border-bottom: 1px solid #2d3148;
    }

    td {
      padding: 10px 14px;
      border-bottom: 1px solid #1e2235;
      vertical-align: middle;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover td {
      background: #13161f;
    }

    .status-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
    }

    .status-created    { background: #1e293b; color: #94a3b8; }
    .status-dispatched { background: #2e1065; color: #c4b5fd; }
    .status-running    { background: #172554; color: #93c5fd; }
    .status-completed  { background: #052e16; color: #86efac; }
    .status-failed     { background: #450a0a; color: #fca5a5; }
    .status-cancelled  { background: #1c1917; color: #78716c; }

    .action-cell {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .btn-cancel, .btn-retry {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn-cancel {
      background: #7f1d1d;
      color: #fca5a5;
    }

    .btn-cancel:hover { opacity: 0.8; }

    .btn-retry {
      background: #172554;
      color: #93c5fd;
    }

    .btn-retry:hover { opacity: 0.8; }

    .btn-cancel:disabled, .btn-retry:disabled {
      opacity: 0.35;
      cursor: default;
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: #334155;
      font-size: 14px;
    }

    #loading {
      text-align: center;
      padding: 40px;
      color: #64748b;
      font-size: 14px;
    }

    .task-id {
      color: #475569;
      font-size: 11px;
      font-family: monospace;
    }

    .task-agent {
      font-size: 12px;
      font-weight: 600;
      color: #c4b5fd;
    }

    .task-action {
      font-size: 12px;
      color: #94a3b8;
    }

    .task-project {
      font-size: 11px;
      font-family: monospace;
      color: #64748b;
    }
  </style>
</head>
<body>

<header>
  <div class="header-nav">
    <h1>任務治理面板</h1>
    <a href="/" class="nav-link">← Kanban 看板</a>
    <a href="/approval-queue.html" class="nav-link">人工審核佇列</a>
  </div>
  <div id="refresh-info">
    上次更新：<span id="last-update">—</span>
  </div>
</header>

<div id="error-banner"></div>
<div id="success-banner"></div>

<div class="main-content">

  <div class="status-summary" id="status-summary">
    <div class="status-chip chip-running">
      <div class="status-chip-value" id="cnt-running">—</div>
      <div class="status-chip-label">Running</div>
    </div>
    <div class="status-chip chip-dispatched">
      <div class="status-chip-value" id="cnt-dispatched">—</div>
      <div class="status-chip-label">Dispatched</div>
    </div>
    <div class="status-chip chip-created">
      <div class="status-chip-value" id="cnt-created">—</div>
      <div class="status-chip-label">Created</div>
    </div>
    <div class="status-chip chip-completed">
      <div class="status-chip-value" id="cnt-completed">—</div>
      <div class="status-chip-label">Completed</div>
    </div>
    <div class="status-chip chip-failed">
      <div class="status-chip-value" id="cnt-failed">—</div>
      <div class="status-chip-label">Failed</div>
    </div>
    <div class="status-chip chip-cancelled">
      <div class="status-chip-value" id="cnt-cancelled">—</div>
      <div class="status-chip-label">Cancelled</div>
    </div>
  </div>

  <div class="filter-bar">
    <span class="filter-label">狀態篩選</span>
    <button class="filter-btn active" data-status="">全部</button>
    <button class="filter-btn" data-status="running">Running</button>
    <button class="filter-btn" data-status="dispatched">Dispatched</button>
    <button class="filter-btn" data-status="failed">Failed</button>
    <button class="filter-btn" data-status="completed">Completed</button>
    <button class="filter-btn" data-status="cancelled">Cancelled</button>
    <button class="refresh-btn" id="refresh-btn">重新整理</button>
  </div>

  <div id="loading">載入中…</div>

  <div class="task-table-wrap" id="table-wrap" style="display:none">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Agent</th>
          <th>Action</th>
          <th>Project</th>
          <th>狀態</th>
          <th>建立時間</th>
          <th>更新時間</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="task-tbody"></tbody>
    </table>
  </div>
  <div id="empty-state" class="empty-state" style="display:none">目前沒有任務記錄</div>

</div>

<script>
let currentStatusFilter = '';

function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString('zh-TW', {
    month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit', second: '2-digit',
  });
}

function statusBadge(status) {
  return `<span class="status-badge status-${escHtml(status)}">${escHtml(status)}</span>`;
}

function renderTaskRow(task) {
  const canCancel = ['created', 'dispatched', 'running'].includes(task.status);
  const canRetry  = ['failed', 'cancelled'].includes(task.status) && task.project_id;

  const cancelBtn = canCancel
    ? `<button class="btn-cancel" onclick="cancelTask(${task.id}, this)">Cancel</button>`
    : '';
  const retryBtn = canRetry
    ? `<button class="btn-retry" onclick="retryTask(${task.id}, this)">Retry</button>`
    : '';

  return `<tr id="task-row-${task.id}">
    <td class="task-id">#${task.id}</td>
    <td class="task-agent">${escHtml(task.agent_name)}</td>
    <td class="task-action">${escHtml(task.action)}</td>
    <td class="task-project">${task.project_id ? `proj#${task.project_id}` : '—'}</td>
    <td>${statusBadge(task.status)}</td>
    <td style="font-size:11px;color:#64748b;">${fmtDate(task.created_at)}</td>
    <td style="font-size:11px;color:#64748b;">${fmtDate(task.updated_at)}</td>
    <td><div class="action-cell">${cancelBtn}${retryBtn}</div></td>
  </tr>`;
}

function updateSummary(tasks) {
  const counts = { created: 0, dispatched: 0, running: 0, completed: 0, failed: 0, cancelled: 0 };
  for (const t of tasks) {
    if (counts[t.status] !== undefined) counts[t.status]++;
  }
  document.getElementById('cnt-running').textContent    = counts.running;
  document.getElementById('cnt-dispatched').textContent = counts.dispatched;
  document.getElementById('cnt-created').textContent    = counts.created;
  document.getElementById('cnt-completed').textContent  = counts.completed;
  document.getElementById('cnt-failed').textContent     = counts.failed;
  document.getElementById('cnt-cancelled').textContent  = counts.cancelled;
}

async function loadTasks() {
  const errorBanner = document.getElementById('error-banner');
  errorBanner.style.display = 'none';
  document.getElementById('loading').style.display = 'block';
  document.getElementById('table-wrap').style.display = 'none';
  document.getElementById('empty-state').style.display = 'none';

  const params = currentStatusFilter ? `?status=${encodeURIComponent(currentStatusFilter)}` : '';
  try {
    const res = await fetch(`/api/task-governance${params}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const tasks = data.tasks || [];

    document.getElementById('loading').style.display = 'none';
    document.getElementById('last-update').textContent = new Date().toLocaleTimeString('zh-TW');

    // Update summary with full list (no filter) if showing all
    if (!currentStatusFilter) updateSummary(tasks);

    if (tasks.length === 0) {
      document.getElementById('empty-state').style.display = 'block';
      return;
    }

    document.getElementById('task-tbody').innerHTML = tasks.map(renderTaskRow).join('');
    document.getElementById('table-wrap').style.display = 'block';
  } catch (err) {
    document.getElementById('loading').style.display = 'none';
    errorBanner.textContent = `無法載入任務：${err.message}`;
    errorBanner.style.display = 'block';
  }
}

async function cancelTask(taskId, btn) {
  btn.disabled = true;
  const successBanner = document.getElementById('success-banner');
  const errorBanner   = document.getElementById('error-banner');
  successBanner.style.display = 'none';
  errorBanner.style.display   = 'none';

  try {
    const res = await fetch(`/api/task-governance/${taskId}/cancel`, { method: 'PATCH' });
    const data = await res.json();
    if (!res.ok) {
      errorBanner.textContent = `Cancel 失敗：${data.error || res.status}`;
      errorBanner.style.display = 'block';
      btn.disabled = false;
      return;
    }
    successBanner.textContent = `任務 #${taskId} 已取消`;
    successBanner.style.display = 'block';
    // Refresh the row
    await loadTasks();
  } catch (err) {
    errorBanner.textContent = `Cancel 錯誤：${err.message}`;
    errorBanner.style.display = 'block';
    btn.disabled = false;
  }
}

async function retryTask(taskId, btn) {
  btn.disabled = true;
  const successBanner = document.getElementById('success-banner');
  const errorBanner   = document.getElementById('error-banner');
  successBanner.style.display = 'none';
  errorBanner.style.display   = 'none';

  try {
    const res = await fetch(`/api/task-governance/${taskId}/retry`, { method: 'POST' });
    const data = await res.json();
    if (!res.ok) {
      errorBanner.textContent = `Retry 失敗：${data.error || data.dispatch?.error || res.status}`;
      errorBanner.style.display = 'block';
      btn.disabled = false;
      return;
    }
    successBanner.textContent = `任務 #${taskId} 已重新派送 (新 Paperclip task: ${data.dispatch?.paperclip_task_id ?? '—'})`;
    successBanner.style.display = 'block';
    await loadTasks();
  } catch (err) {
    errorBanner.textContent = `Retry 錯誤：${err.message}`;
    errorBanner.style.display = 'block';
    btn.disabled = false;
  }
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentStatusFilter = btn.dataset.status;
    loadTasks();
  });
});

document.getElementById('refresh-btn').addEventListener('click', loadTasks);

// Initial load + auto-refresh every 30s
loadTasks();
setInterval(loadTasks, 30000);
</script>

</body>
</html>
