version: "3.9"

networks:
  agency-net:
    driver: bridge

volumes:
  n8n_data:
  ollama_data:
  postgres_data:
  redis_data:

services:

  # ─── n8n ──────────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: agency-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=${N8N_HOST:-0.0.0.0}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - agency-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Ollama ───────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: agency-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - agency-net
    # GPU 支援（可選，需要 nvidia container toolkit）
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ─── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: agency-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - agency-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: agency-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - agency-net
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Scraper Service ──────────────────────────────────────────
  scraper:
    build:
      context: ./services/scraper
      dockerfile: Dockerfile
    container_name: agency-scraper
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    networks:
      - agency-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Telegram Bot Service ─────────────────────────────────────
  telegram-bot:
    build:
      context: ./services/telegram-bot
      dockerfile: Dockerfile
    container_name: agency-telegram-bot
    restart: unless-stopped
    ports:
      - "3004:3004"
    environment:
      - NODE_ENV=production
      - PORT=3004
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - NOTIFY_POLL_INTERVAL_MS=${NOTIFY_POLL_INTERVAL_MS:-30000}
    networks:
      - agency-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Ollama Scorer Service ────────────────────────────────────
  ollama-scorer:
    build:
      context: ./services/scorer
      dockerfile: Dockerfile
    container_name: agency-ollama-scorer
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - PORT=3002
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
    networks:
      - agency-net
    depends_on:
      ollama:
        condition: service_started

  # ─── Project Bootstrapper ────────────────────────────────────
  bootstrapper:
    build:
      context: ./services/bootstrapper
      dockerfile: Dockerfile
    container_name: agency-bootstrapper
    restart: unless-stopped
    ports:
      - "3005:3005"
    environment:
      - NODE_ENV=production
      - PORT=3005
      - DB_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - PROJECTS_ROOT=/projects
    volumes:
      - ./projects:/projects
    networks:
      - agency-net
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Dev Agent Dispatcher ─────────────────────────────────────
  dev-dispatcher:
    build:
      context: ./services/dev-dispatcher
      dockerfile: Dockerfile
    container_name: agency-dev-dispatcher
    restart: unless-stopped
    ports:
      - "3006:3006"
    environment:
      - NODE_ENV=production
      - PORT=3006
      - DB_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - PROJECTS_ROOT=/projects
      - PAPERCLIP_URL=http://paperclip:3008
    volumes:
      - ./projects:/projects
    networks:
      - agency-net
    depends_on:
      postgres:
        condition: service_healthy
      paperclip:
        condition: service_started

  # ─── Revision Manager ─────────────────────────────────────────
  revision-manager:
    build:
      context: ./services/revision-manager
      dockerfile: Dockerfile
    container_name: agency-revision-manager
    restart: unless-stopped
    ports:
      - "3007:3007"
    environment:
      - NODE_ENV=production
      - PORT=3007
      - DB_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - PROJECTS_ROOT=/projects
      - DEV_DISPATCHER_URL=http://dev-dispatcher:3006
      - PAPERCLIP_URL=http://paperclip:3008
    volumes:
      - ./projects:/projects
    networks:
      - agency-net
    depends_on:
      postgres:
        condition: service_healthy
      paperclip:
        condition: service_started

  # ─── Paperclip Task Registry ──────────────────────────────────
  paperclip:
    build:
      context: ./services/paperclip
      dockerfile: Dockerfile
    container_name: agency-paperclip
    restart: unless-stopped
    ports:
      - "3008:3008"
    environment:
      - NODE_ENV=production
      - PORT=3008
      - DB_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    networks:
      - agency-net
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Kanban Dashboard ─────────────────────────────────────────
  dashboard:
    build:
      context: ./services/dashboard
      dockerfile: Dockerfile
    container_name: agency-dashboard
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=production
      - PORT=3003
      - DB_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - PAPERCLIP_URL=http://paperclip:3008
      - DEV_DISPATCHER_URL=http://dev-dispatcher:3006
    networks:
      - agency-net
    depends_on:
      postgres:
        condition: service_healthy
      paperclip:
        condition: service_started
